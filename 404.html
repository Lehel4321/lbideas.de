<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Lehel Balog</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="stylesheet" href="/assets/fonts/fonts.css">
<script>
try {
  var t = localStorage.getItem('theme') || (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
} catch (e) {}
</script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:#7e8d95; color:#080e10;
    font-family:'Barlow Condensed', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:2rem;
  }
  .plate {
    background:linear-gradient(135deg, #9aaab2 0%, #7e8d95 55%, #6e7e86 100%);
    border-left:1px solid rgba(255,255,255,0.2);
    border-right:2px solid #5a6870;
    border-bottom:4px solid #1a2226;
    box-shadow:2px 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    padding:3rem 3.5rem; max-width:520px; text-align:center;
  }
  .code {
    font-size:clamp(4rem,15vw,6.5rem); font-weight:800; line-height:1;
    text-shadow:0 -1px 1px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.3);
  }
  .tag {
    font-family:'IBM Plex Mono', monospace; font-size:0.7rem; font-weight:700;
    letter-spacing:0.18em; text-transform:uppercase; color:#152028;
    margin:0.8rem 0 1.4rem;
  }
  p { font-family:'IBM Plex Mono', monospace; font-size:0.78rem; line-height:1.8; color:#152028; }
  p + p { margin-top:0.4rem; }
  a.btn {
    display:inline-block; margin-top:1.6rem;
    font-family:'IBM Plex Mono', monospace; font-size:0.68rem; font-weight:600;
    letter-spacing:0.12em; text-transform:uppercase;
    padding:0.7rem 1.7rem; background:#1a2226; color:#b8c8d0;
    text-decoration:none; border:1px solid #1a2226;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
  }
  a.btn:hover { background:#0d1518; }

  html[data-theme="dark"] body { background:#0f1417; color:#d7e2e8; }
  html[data-theme="dark"] .plate {
    background:linear-gradient(135deg, #232c33 0%, #1b2227 55%, #161c21 100%);
    border-left-color:rgba(255,255,255,0.06); border-right-color:#0b0f12; border-bottom-color:#05080a;
  }
  html[data-theme="dark"] .code { text-shadow:0 2px 3px rgba(0,0,0,0.55); }
  html[data-theme="dark"] .tag, html[data-theme="dark"] p { color:#93a6b1; }
  html[data-theme="dark"] a.btn { background:rgba(232,163,61,0.1); color:#e8a33d; border-color:rgba(232,163,61,0.45); }
  html[data-theme="dark"] a.btn:hover { background:rgba(232,163,61,0.2); }
</style>
</head>
<body>
  <div class="plate">
    <div class="code">404</div>
    <div class="tag">Page not found · Seite nicht gefunden</div>
    <p>The page you are looking for does not exist or has been moved.</p>
    <p>Die gesuchte Seite existiert nicht oder wurde verschoben.</p>
    <a class="btn" href="/">← lbideas.de</a>
  </div>
</body>
</html>
